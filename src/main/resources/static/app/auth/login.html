<!DOCTYPE html>
<html>
<head>
    <title>GroupFund Login</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body>

<div class="container">
    <div class="card">
        <div class="logo">
            <h1>GroupFund</h1>
            <p>Login to your account</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required>
            </div>

            <button type="submit" class="btn">Login</button>
        </form>

        <p id="loginMessage" class="message"></p>

        <div class="link" id="forgotPasswordLink" >
            <a href="#" id="openForgotModal">Forgot Password?</a>
        </div>

        <div class="link">
            New user? <a href="register.html">Create account</a>
        </div>
    </div>
</div>
<div id="forgotModal" class="modal-overlay">
    <div class="otp-card">
        <button id="closeForgotModal" class="close-btn">&#8592; Back</button>

        <h2>Forgot Password</h2>
        <p>Enter your email and verify OTP</p>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="forgotEmail" required>
        </div>

        <button id="sendForgotOtpBtn" class="btn">Get OTP</button>

        <div id="forgotOtpSection" style="display:none;">
            <div class="otp-inputs">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
            </div>

            <button id="verifyForgotOtpBtn" class="btn">Verify OTP</button>
        </div>

        <div id="resetPasswordSection" style="display:none;">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmNewPassword">
            </div>

            <button id="resetPasswordBtn" class="btn">Reset Password</button>
        </div>

        <p id="forgotMessage" class="message"></p>
    </div>
</div>
<script src="js/config.js"></script>
<script src="js/login.js"></script>
<script src="js/forgot-password.js"></script>
</body>
</html>
